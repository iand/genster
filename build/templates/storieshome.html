{{/* storieshome - stories section index listing individual stories */}}
{{define "storieshome"}}
<!DOCTYPE html>
<html lang="en-GB">
{{template "head" .}}
<body>
  <div class="page-grid">
    {{template "site-header" .}}
    <main class="content">
      <header>
        <h1>{{.Title}}</h1>
      </header>
      <section>
        {{template "stories-listing" .Children}}
      </section>
    </main>
    <section class="sidebar">
      <div class="feature"><img src="/images/default-oak.webp" width="256" height="256" class="feature" title=""/></div>
    </section>
    {{template "footer" .}}
  </div>
  {{template "scripts" .}}
</body>
</html>
{{end}}
