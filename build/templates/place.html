{{/* place - individual place page within a tree */}}
{{define "place"}}
<!DOCTYPE html>
<html lang="en-GB">
{{template "head" .}}
<body>
  <div class="page-grid">
    {{template "tree-header" .}}
    <main class="content" data-pagefind-body data-pagefind-weight="0.5" data-pagefind-meta="section:{{.Tree.Title}}">
      <header>
        <h1 data-pagefind-meta="title">{{.Title}}</h1>
      </header>
      <section>
        <div class="place">
          {{.Body}}
        </div>
      </section>
    </main>
    <section class="sidebar">
      {{template "featureimage" .}}
      {{- if .Summary}}<div class="summary">{{.Summary}}</div>{{end}}
      {{template "tags" .}}
    </section>
    {{template "footer" .}}
  </div>
  {{template "scripts" .}}
</body>
</html>
{{end}}
