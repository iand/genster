{{/* list - generic list layout for manual content pages not associated with a tree */}}
{{define "list"}}
<!DOCTYPE html>
<html lang="en-GB">
{{template "head" .}}
<body>
  <div class="page-grid">
    {{template "site-header" .}}
    <main class="content">
      <header>
        <h1>{{.Title}}</h1>
      </header>
      <section>
        {{.Body}}
      </section>
    </main>
    <section class="sidebar">
      {{template "featureimage" .}}
    </section>
    {{template "footer" .}}
  </div>
  {{template "scripts" .}}
</body>
</html>
{{end}}
